                        post.content && React.createElement("div", { style: { background: "rgba(10, 10, 15, 0.6)", borderRadius: 16, padding: 24, marginBottom: 24, fontSize: 14, color: C.text, lineHeight: 1.8, maxHeight: 300, overflowY: "auto" } }, post.content),
                        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 24 } },
                            [
                                ["👁 Views", formatNumber(post.views || 0)],
                                ["🔗 Backlinks", post.outbound_url ? "Active" : "None"],
                                ["📅 Published", timeAgo(post.created_at)]
                            ].map(([label, value]) => 
                                React.createElement("div", { key: label, style: { background: "rgba(10, 10, 15, 0.4)", borderRadius: 14, padding: 16, textAlign: "center" } },
                                    React.createElement("div", { style: { fontSize: 24, fontWeight: 700, color: C.white, marginBottom: 4 } }, value),
                                    React.createElement("div", { style: { fontSize: 12, color: C.muted } }, label)
                                )
                            )
                        ),
                        post.outbound_url && React.createElement("div", { style: { background: "rgba(139, 92, 246, 0.08)", borderRadius: 16, padding: 18, marginBottom: 24, border: `1px solid ${C.accent}30` } },
                            React.createElement("div", { style: { fontSize: 12, color: C.textSecondary, marginBottom: 8 } }, "🔗 Outbound Link"),
                            React.createElement("a", { href: post.outbound_url, target: "_blank", rel: "noreferrer", style: { fontSize: 14, color: C.accentLight, wordBreak: "break-all", textDecoration: "none" } }, post.outbound_url),
                            React.createElement("span", { style: { fontSize: 12, color: C.muted, marginLeft: 12 } }, `rel="${post.link_type}"`)
                        ),
                        React.createElement("div", { style: { display: "flex", gap: 12 } },
                            isOwner && React.createElement("button", { className: "btn btn-danger", onClick: handleDelete, disabled: deleting }, deleting ? React.createElement("span", { className: "spinner" }) : "🗑 Delete Post"),
                            React.createElement("button", { className: "btn btn-secondary", onClick: () => navigator.clipboard.writeText(`${window.location.href}#${post.slug}`) }, "📋 Copy Link")
                        )
                    )
                )
            );
        }

        // ─── Main App Component ─────────────────────────────────────────────────────
        function App() {
            const [session, setSession] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [posts, setPosts] = useState([]);
            const [postsLoading, setPostsLoading] = useState(false);
            const [currentView, setCurrentView] = useState("dashboard");
            const [showPublishModal, setShowPublishModal] = useState(false);
            const [selectedPost, setSelectedPost] = useState(null);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setAuthLoading(false);
                });

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    setAuthLoading(false);
                });

                return () => subscription.unsubscribe();
            }, []);

            const loadPosts = useCallback(async () => {
                if (!session) return;
                setPostsLoading(true);
                const { data, error } = await supabase
                    .from("posts")
                    .select("*, profiles(full_name, email, avatar_url)")
                    .eq("status", "published")
                    .order("created_at", { ascending: false });
                if (!error && data) setPosts(data);
                setPostsLoading(false);
            }, [session]);

            useEffect(() => {
                if (session) loadPosts();
            }, [session, loadPosts]);

            useEffect(() => {
                const handler = (e) => setSelectedPost(e.detail);
                document.addEventListener("openPost", handler);
                return () => document.removeEventListener("openPost", handler);
            }, []);

            const handleSignOut = async () => {
                await supabase.auth.signOut();
                setSession(null);
                setPosts([]);
            };

            const handlePostPublished = (newPost) => {
                setPosts(prev => [newPost, ...prev]);
            };

            const handlePostDeleted = (postId) => {
                setPosts(prev => prev.filter(p => p.id !== postId));
            };

            if (authLoading) {
                return React.createElement("div", { style: { minHeight: "100vh", background: C.bg } }, React.createElement(Loader, { text: "Loading RankForge..." }));
            }

            if (!session) return React.createElement(AuthScreen);

            return React.createElement(React.Fragment, null,
                React.createElement("div", { style: { display: "flex", minHeight: "100vh", background: C.bg } },
                    React.createElement(Sidebar, { view: currentView, setView: setCurrentView, user: session.user, onSignOut: handleSignOut, onPublish: () => setShowPublishModal(true) }),
                    React.createElement("div", { style: { flex: 1, overflowY: "auto", position: "relative" } },
                        React.createElement("div", { style: { position: "relative", zIndex: 1 } },
                            postsLoading ? React.createElement(Loader, { text: "Loading posts..." }) : React.createElement(React.Fragment, null,
                                currentView === "dashboard" && React.createElement(DashboardView, { posts: posts, user: session.user }),
                                currentView === "posts" && React.createElement(PostsView, { posts: posts, onOpen: setSelectedPost, mineOnly: false, user: session.user }),
                                currentView === "mine" && React.createElement(PostsView, { posts: posts, onOpen: setSelectedPost, mineOnly: true, user: session.user }),
                                currentView === "backlinks" && React.createElement(BacklinksView, { posts: posts }),
                                currentView === "analytics" && React.createElement(AnalyticsView, { posts: posts, user: session.user })
                            )
                        )
                    )
                ),
                showPublishModal && React.createElement(PublishModal, { user: session.user, onClose: () => setShowPublishModal(false), onPublished: handlePostPublished }),
                selectedPost && React.createElement(PostDetail, { post: selectedPost, user: session.user, onClose: () => setSelectedPost(null), onDeleted: handlePostDeleted })
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
